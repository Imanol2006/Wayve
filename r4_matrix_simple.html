<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R4 Matrix Control</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, sans-serif;
    background: #0f1115;
    color: #e8e8e8;
    min-height: 100vh;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1 { font-size: 22px; margin-bottom: 24px; }

  .status {
    width: 100%;
    max-width: 360px;
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 16px;
    font-size: 14px;
    text-align: center;
    background: #1a1d24;
    border: 1px solid #2a2e38;
  }
  .status.connected { background: #1a3a1f; border-color: #2d6b35; color: #7ee08c; }
  .status.error     { background: #3a1a1a; border-color: #6b2d2d; color: #e07e7e; }

  .btn {
    width: 100%;
    max-width: 360px;
    padding: 18px;
    margin: 6px 0;
    font-size: 17px;
    font-weight: 500;
    border: none;
    border-radius: 8px;
    background: #2a2e38;
    color: #e8e8e8;
    cursor: pointer;
  }
  .btn:active { background: #3a3e48; }
  .btn:disabled { opacity: 0.4; }
  .btn.primary { background: #2d6bff; }
  .btn.on  { background: #2d8b3a; }
  .btn.off { background: #6b2d2d; }
</style>
</head>
<body>

<h1>Matrix Control</h1>

<div id="status" class="status">Not connected</div>

<button id="connectBtn" class="btn primary">Connect to R4_LED</button>
<button id="onBtn"  class="btn on"  disabled>Matrix ON (smiley)</button>
<button id="offBtn" class="btn off" disabled>Matrix OFF</button>

<script>
  const SERVICE_UUID = '19b20000-e8f2-537e-4f6c-d104768a1214';
  const COMMAND_UUID = '19b20001-e8f2-537e-4f6c-d104768a1214';

  let characteristic = null;

  const statusEl   = document.getElementById('status');
  const connectBtn = document.getElementById('connectBtn');
  const onBtn      = document.getElementById('onBtn');
  const offBtn     = document.getElementById('offBtn');

  function setStatus(msg, kind) {
    statusEl.textContent = msg;
    statusEl.className = 'status' + (kind ? ' ' + kind : '');
  }

  async function connect() {
    if (!navigator.bluetooth) {
      setStatus('Web Bluetooth not supported. Use Bluefy on iOS or Chrome on Android.', 'error');
      return;
    }
    try {
      setStatus('Picking device...');
      const device = await navigator.bluetooth.requestDevice({
        filters: [{ name: 'R4_LED' }],
        optionalServices: [SERVICE_UUID]
      });
      setStatus('Connecting...');
      const server  = await device.gatt.connect();
      const service = await server.getPrimaryService(SERVICE_UUID);
      characteristic = await service.getCharacteristic(COMMAND_UUID);

      device.addEventListener('gattserverdisconnected', () => {
        setStatus('Disconnected', 'error');
        onBtn.disabled = true;
        offBtn.disabled = true;
        connectBtn.disabled = false;
      });

      setStatus('Connected', 'connected');
      onBtn.disabled = false;
      offBtn.disabled = false;
      connectBtn.disabled = true;
    } catch (err) {
      setStatus('Failed: ' + err.message, 'error');
    }
  }

  async function send(cmd) {
    if (!characteristic) return;
    try {
      await characteristic.writeValue(new TextEncoder().encode(cmd));
    } catch (err) {
      setStatus('Send failed: ' + err.message, 'error');
    }
  }

  connectBtn.addEventListener('click', connect);
  onBtn.addEventListener('click',  () => send('M'));  // smiley
  offBtn.addEventListener('click', () => send('X'));  // clear matrix
</script>

</body>
</html>
